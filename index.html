<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2D6A4F">
  <meta name="description" content="Planificador de menú semanal para David y María">
  <title>🍽️ Menú Semanal</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <button class="header__back hidden" id="btn-back" aria-label="Volver">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <h1 class="header__title" id="header-title">Menú Semanal</h1>
      <button class="header__menu" id="btn-menu" aria-label="Menú">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12h18M3 6h18M3 18h18"/>
        </svg>
      </button>
    </header>

    <!-- Main Content -->
    <main class="main" id="main-content">
      <!-- Dynamic content injected here -->
    </main>

    <!-- Navigation Tabs -->
    <nav class="nav-tabs" id="nav-tabs">
      <button class="nav-tab active" data-view="menu" aria-label="Menú semanal">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
        <span>Menú</span>
      </button>
      <button class="nav-tab" data-view="recipes" aria-label="Recetas">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19h16M4 15h16M4 11h16M4 7h16"/>
        </svg>
        <span>Recetas</span>
      </button>
    </nav>

    <!-- Modal Container -->
    <div class="modal-backdrop hidden" id="modal-backdrop">
      <div class="modal" id="modal" role="dialog" aria-modal="true">
        <div class="modal__header">
          <h2 class="modal__title" id="modal-title">Modal</h2>
          <button class="modal__close" id="modal-close" aria-label="Cerrar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="modal__content" id="modal-content">
          <!-- Dynamic modal content -->
        </div>
      </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast hidden" id="toast">
      <span id="toast-message">Mensaje</span>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/translations.js"></script>
  <script src="js/store.js"></script>
  <script src="js/recipes.js"></script>
  <script src="js/nutrition.js"></script>
  <script src="js/components.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
